<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        form {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #04AA6D;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #038a59;
        }
        .review-container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .review {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .review:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <h2>Leave a Review</h2>
    <form id="reviewForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required>

        <label for="rating">Star Rating:</label>
        <select id="rating" required>
            <option value="5">★★★★★ (5)</option>
            <option value="4">★★★★☆ (4)</option>
            <option value="3">★★★☆☆ (3)</option>
            <option value="2">★★☆☆☆ (2)</option>
            <option value="1">★☆☆☆☆ (1)</option>
        </select>

        <label for="review">Your Review:</label>
        <textarea id="review" rows="4" required></textarea>

        <button type="submit">Submit Review</button>
    </form>

    <h2>Reviews</h2>
    <div class="review-container" id="reviews"></div>

    <script>
        document.getElementById('reviewForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const rating = document.getElementById('rating').value;
            const review = document.getElementById('review').value;

            const response = await fetch('http://localhost:5500/submit-review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, rating, review })
            });

            if (response.ok) {
                alert('Review submitted successfully!');
                document.getElementById('reviewForm').reset();
                loadReviews();
            } else {
                alert('Error submitting review.');
            }
        });

        async function loadReviews() {
            const response = await fetch('http://localhost:5500/get-reviews');
            const reviews = await response.json();
            const reviewContainer = document.getElementById('reviews');
            reviewContainer.innerHTML = '';

            reviews.forEach(r => {
                const div = document.createElement('div');
                div.classList.add('review');
                div.innerHTML = `<strong>${r.name}</strong> - ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                                 <p>${r.review}</p>`;
                reviewContainer.appendChild(div);
            });
        }

        loadReviews();
    </script>

</body>
</html>
