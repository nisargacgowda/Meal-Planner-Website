<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Healthy Grams</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: black;
            overflow: hidden; /* Prevent scrolling */
        }
        .slideshow-container {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }
        .slideshow-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        nav {
            text-align: center;
            position: absolute;
            top: 10%;
            width: 100%;
            padding: 5px 0;
            font-weight: bolder;
        }
        nav a {
            color: black;
            padding: 8px 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bolder;
        }
        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        .container {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 35%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            z-index: 10;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        form label {
            margin-bottom: 0.3rem;
            font-weight: bold;
            font-size: 0.9rem;
            width: 90%;
            text-align: left;
        }
        form input, form textarea {
            margin-bottom: 0.8rem;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
            width: 90%;
        }
        form textarea {
            resize: vertical;
            min-height: 60px;
        }
        form button {
            background-color: #007bff;
            color: white;
            padding: 0.6rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            width: 90%;
            transition: background-color 0.3s ease;
        }
        form button:hover {
            background-color: #0056b3;
        }
        .status-message {
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .success { color: green; }
        .error { color: red; }
        .loader {
            display: none;
            margin: 10px auto;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        header {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: black;
            padding: 10px 0;
            width: 100%;
            position: absolute;
            top: 0;
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <img src="contactus.jpeg" alt="Background Image">
    </div>
    <header>HEALTHY GRAMS</header>
    <nav>
        <a href="index.html">Home</a>
        <a href="mealplan.html">Meal Planner</a>
        <a href="abt.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h2>Contact Us</h2>
        <p style="font-size: 0.9rem;">We'd love to hear from you! Whether you have questions, feedback, or just want to say hello, feel free to reach out using the contact form below.</p>
        <form id="contactForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Send Message</button>
            <div class="loader" id="loader"></div>
            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const statusMessage = document.getElementById('statusMessage');
            const loader = document.getElementById('loader');
            statusMessage.textContent = "";
            statusMessage.className = "status-message";
            loader.style.display = "block";

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            fetch('http://localhost:3000/submit-contact-form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(response => {
                loader.style.display = "none";
                if (response.ok) {
                    statusMessage.textContent = "Message sent successfully!";
                    statusMessage.classList.add("success");
                    document.getElementById('contactForm').reset();
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .catch(error => {
                loader.style.display = "none";
                statusMessage.textContent = "There was an error sending your message.";
                statusMessage.classList.add("error");
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
