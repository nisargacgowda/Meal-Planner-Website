<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALTHY GRAMS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: black;
            overflow: hidden; /* Prevent scrolling */
        }
        .slideshow-container {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }
        .slideshow-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slideshow-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        header {
            position: absolute;
            top: 5%; /* Moved higher */
            width: 100%;
            text-align: center;
            font-size: 2.0rem;
            font-weight: bold;
            z-index: 10;
        }
        nav {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        nav a {
            color: black;
            padding: 15px 20px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            font-size: 1.2rem;
        }
        nav a:hover {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }
        .container {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <div class="slideshow-slide" style="opacity: 1;">
            <img src="slide1.jpg" alt="Slide 1">
        </div>
        <div class="slideshow-slide">
            <img src="slide4.jpg" alt="Slide 2">
        </div>
        <div class="slideshow-slide">
            <img src="slide3.jpg" alt="Slide 3">
        </div>
        <div class="slideshow-slide">
            <img src="slide4.jpg" alt="Slide 4">
        </div>
    </div>

    <header>
        <h1>HEALTHY GRAMS</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="mealplan.html">Meal Planner</a>
        <a href="abt.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <p>Your journey to a healthier life starts here!</p>
    </div>

    <script>
        let currentIndex = 0;
        const slides = document.querySelectorAll('.slideshow-slide');
        const totalSlides = slides.length;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.style.opacity = i === index ? '1' : '0';
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            showSlide(currentIndex);
        }

        setInterval(nextSlide, 1000); // Change slide every 3 seconds
    </script>
</body>
</html>
